# ============================================================
# Application name
# ============================================================
spring.application.name=microquest

# ============================================================
# DataSource — PostgreSQL connection
# The microquest database must exist and the microquest role
# must have full privileges on it before the app starts.
# ============================================================
spring.datasource.url=jdbc:postgresql://localhost:5432/microquest
spring.datasource.username=microquest
spring.datasource.password=microquest

# ============================================================
# JPA / Hibernate
# ddl-auto=update: schema changes are applied automatically
# on startup; never use "create-drop" in production.
# show-sql=false: keep logs quiet; flip to true for debugging.
# non_contextual_creation: suppresses a Hibernate/PostgreSQL
# JDBC LOB warning.
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ============================================================
# Thymeleaf
# cache=false: templates are re-read on every request,
# allowing live edits during development.
# ============================================================
spring.thymeleaf.cache=false

# ============================================================
# Web / MVC
# default-page-size: number of quests shown per page in the
# paginated quest list.
# hiddenmethod.filter.enabled: allows HTML forms to send
# PUT/DELETE via a hidden _method field.
# whitelabel.enabled=false: disables the default Spring error
# page so our custom error templates are used instead.
# ============================================================
spring.data.web.pageable.default-page-size=6
spring.mvc.hiddenmethod.filter.enabled=true
server.error.whitelabel.enabled=false

# ============================================================
# External secrets
# The .env file holds SMTP credentials, the admin bootstrap
# password, and similar secrets that must never be committed
# to source control.  "optional:" means the app still starts
# if the file is absent (e.g. in CI environments).
# ============================================================
spring.config.import=optional:file:.env[.properties]

# ============================================================
# File storage
# Uploaded GIFs and photo-ID images are written to sub-folders
# of this directory relative to the working directory.
# FileStorageService creates the folders if they do not exist.
# ============================================================
storage.location=uploads

# ============================================================
# Multipart upload limits
# max-file-size: largest single file accepted (GIF uploads).
# max-request-size: total body size limit.
# max-swallow-size=-1: tells Tomcat to fully read (and discard)
# oversized request bodies so it can return a clean 413 error
# response rather than resetting the TCP connection.
# ============================================================
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=50MB
server.tomcat.max-swallow-size=-1

# ============================================================
# Email / SMTP
# Credentials come from .env (see above).  Leave host blank to
# skip sending entirely — EmailService handles the empty case
# gracefully without throwing.
# ============================================================
spring.mail.host=
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# ============================================================
# Admin bootstrap — SeedDataConfig uses these values to create
# the initial admin account on first startup.
# All values fall back to defaults if not set in .env.
# ============================================================
admin.username=${admin.username:drewadoo}
admin.email=${admin.email:zabocek@gmail.com}
admin.password=${admin.password:Eur0p3!$}
admin.displayName=${admin.displayName:Drewadoo}

# ============================================================
# App public base URL
# Used by EmailService when building clickable links inside
# verification / notification emails.
# ============================================================
app.base-url=${app.base-url:http://localhost:8080}

