spring.application.name=microquest
spring.datasource.url=jdbc:postgresql://localhost:5432/microquest
spring.datasource.username=microquest
spring.datasource.password=microquest
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.thymeleaf.cache=false
spring.data.web.pageable.default-page-size=6
spring.mvc.hiddenmethod.filter.enabled=true
server.error.whitelabel.enabled=false

# Load local .env file for secrets (git-ignored)
spring.config.import=optional:file:.env[.properties]

# File storage location for uploaded GIFs and photo IDs
storage.location=uploads

# Max file upload sizes
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=50MB
# Allow Tomcat to swallow oversized uploads so it can send a clean error response
server.tomcat.max-swallow-size=-1

# Email (SMTP) — values come from .env (leave blank to skip sending)
spring.mail.host=
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Admin bootstrap (values come from .env)
admin.username=${admin.username:drewadoo}
admin.email=${admin.email:zabocek@gmail.com}
admin.password=${admin.password:Eur0p3!$}
admin.displayName=${admin.displayName:Drewadoo}

# App public base URL for emails
app.base-url=${app.base-url:http://localhost:8080}

