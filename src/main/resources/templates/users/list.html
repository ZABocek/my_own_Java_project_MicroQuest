<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MicroQuest | Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-bg">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
        <div>
            <h1 class="mb-1">Profiles</h1>
            <p class="text-muted mb-0">Starter user profiles until real authentication is added.</p>
        </div>
        <a class="btn btn-primary" th:href="@{/users/new}">Create Profile</a>
    </div>

    <div class="row g-4">
        <div class="col-md-6 col-xl-4" th:each="user : ${users}">
            <div class="card h-100 border-0 shadow-sm rounded-4">
                <div class="card-body p-4">
                    <div class="avatar-circle mb-3" th:text="${#strings.substring(user.displayName, 0, 1)}">A</div>
                    <h2 class="h5 mb-1" th:text="${user.displayName}">User name</h2>
                    <p class="text-muted mb-2">@<span th:text="${user.username}">username</span></p>
                    <p class="text-secondary" th:text="${user.bio}">Bio</p>
                    <p class="small text-muted mb-0" th:if="${user.homeCity != null and !#strings.isEmpty(user.homeCity)}">
                        City: <span th:text="${user.homeCity}">City</span>
                    </p>
                </div>
                <div class="card-footer bg-white border-0 px-4 pb-4">
                    <a class="btn btn-outline-dark w-100" th:href="@{|/users/${user.id}|}">Open profile</a>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
