<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="'MicroQuest | ' + ${user.displayName}">MicroQuest</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-bg">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-5">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="row g-4">
        <div class="col-lg-4">
            <div class="card border-0 shadow-sm rounded-4 p-4">
                <div class="avatar-circle large mb-3" th:text="${#strings.substring(user.displayName, 0, 1)}">A</div>
                <h1 class="h3 mb-1" th:text="${user.displayName}">Display Name</h1>
                <p class="text-muted mb-1">@<span th:text="${user.username}">username</span></p>
                <!-- Private email: own profile only -->
                <p class="text-muted small mb-3" th:if="${isOwnProfile}">
                    <span th:text="${user.email}">email</span>
                    <span th:if="${!user.emailVerified}" class="badge text-bg-warning ms-1">Unverified</span>
                </p>
                <p th:text="${user.bio}">Bio</p>
                <p class="mb-0" th:if="${user.homeCity != null and !#strings.isEmpty(user.homeCity)}">
                    <strong>City:</strong> <span th:text="${user.homeCity}">City</span>
                </p>
                <!-- Account actions for own profile -->
                <div th:if="${isOwnProfile}" class="mt-3 d-flex flex-column gap-2">
                    <a class="btn btn-outline-secondary btn-sm" th:href="@{|/users/${user.id}/edit|}">Edit Profile</a>
                    <a class="btn btn-outline-dark btn-sm" th:href="@{/auth/change-password}">Change Password</a>
                </div>
                <!-- Report user (for logged-in, non-own-profile users) -->
                <div th:if="${currentUser != null and !isOwnProfile}" class="mt-3">
                    <button class="btn btn-outline-danger btn-sm" type="button" data-bs-toggle="collapse" data-bs-target="#reportForm">
                        Report User
                    </button>
                    <div class="collapse mt-2" id="reportForm">
                        <form th:action="@{|/users/${user.id}/report|}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <textarea class="form-control form-control-sm mb-2" name="reason" rows="3"
                                      placeholder="Reason for report..." required></textarea>
                            <button class="btn btn-danger btn-sm w-100" type="submit">Submit Report</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="col-lg-8">
            <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
                <h2 class="h4 mb-3">Authored quests</h2>
                <div class="list-group list-group-flush">
                    <a class="list-group-item list-group-item-action px-0" th:each="quest : ${authoredQuests}" th:href="@{|/quests/${quest.id}|}">
                        <div class="d-flex justify-content-between align-items-center gap-3">
                            <div>
                                <div class="fw-semibold" th:text="${quest.title}">Quest</div>
                                <div class="small text-muted" th:text="${quest.summary}">Summary</div>
                            </div>
                            <span class="badge text-bg-light" th:text="${quest.category}">CATEGORY</span>
                        </div>
                    </a>
                    <p class="text-muted mb-0" th:if="${#lists.isEmpty(authoredQuests)}">No authored quests yet.</p>
                </div>
            </div>

            <!-- GIF Submissions Gallery -->
            <div class="card border-0 shadow-sm rounded-4 p-4 mb-4" th:if="${submissions != null and !#lists.isEmpty(submissions)}">
                <h2 class="h4 mb-4">Quest Completions</h2>
                <div class="row g-3">
                    <div class="col-md-6" th:each="sub : ${submissions}">
                        <div class="card border-0 shadow-sm rounded-3 overflow-hidden h-100">
                            <img th:src="@{|/uploads/gifs/${sub.gifPath}|}" class="card-img-top" alt="Quest completion GIF"
                                 style="max-height:180px; object-fit:cover;">
                            <div class="card-body p-3">
                                <p class="card-text small" th:text="${sub.caption}"></p>
                                <a th:href="@{|/quests/${sub.quest.id}|}" class="small text-muted text-decoration-none"
                                   th:text="${sub.quest.title}">Quest title</a>
                                <div class="text-muted small mt-1" th:text="${#temporals.format(sub.submittedAt, 'MMM d, yyyy')}">date</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Ban history (admin or own profile) -->
            <div class="card border-0 shadow-sm rounded-4 p-4" th:if="${(isOwnProfile or isAdmin) and banHistory != null and !#lists.isEmpty(banHistory)}">
                <h2 class="h4 mb-3">Ban History</h2>
                <div class="list-group list-group-flush">
                    <div class="list-group-item px-0" th:each="ban : ${banHistory}">
                        <div class="d-flex justify-content-between align-items-start">
                            <div>
                                <span class="badge text-bg-danger me-2" th:text="${ban.tier}">TIER</span>
                                <small th:text="${ban.reason}">Reason</small>
                            </div>
                            <small class="text-muted" th:text="${#temporals.format(ban.issuedAt, 'MMM d, yyyy')}">date</small>
                        </div>
                        <div th:if="${ban.liftedAt != null}" class="small text-success mt-1">Lifted on <span th:text="${#temporals.format(ban.liftedAt, 'MMM d, yyyy')}">date</span></div>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm rounded-4 p-4">
                <h2 class="h4 mb-3">Saved quests</h2>
                <div class="list-group list-group-flush">
                    <a class="list-group-item list-group-item-action px-0" th:each="save : ${savedQuests}" th:href="@{|/quests/${save.quest.id}|}">
                        <div class="d-flex justify-content-between align-items-center gap-3">
                            <div>
                                <div class="fw-semibold" th:text="${save.quest.title}">Quest</div>
                                <div class="small text-muted" th:text="${save.quest.summary}">Summary</div>
                            </div>
                            <span class="badge text-bg-dark">Saved</span>
                        </div>
                    </a>
                    <p class="text-muted mb-0" th:if="${#lists.isEmpty(savedQuests)}">No saved quests yet.</p>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
