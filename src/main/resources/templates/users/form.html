<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MicroQuest | Create Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-bg">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-xl-7">
            <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5">
                <h1 class="mb-1">Create a profile</h1>
                <p class="text-muted mb-4">This simulates user identities until you add full authentication.</p>

                <form th:action="@{/users}" th:object="${userProfileForm}" method="post">
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label">Username</label>
                            <input class="form-control" th:field="*{username}">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Display name</label>
                            <input class="form-control" th:field="*{displayName}">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('displayName')}" th:errors="*{displayName}"></div>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Home city</label>
                            <input class="form-control" th:field="*{homeCity}">
                        </div>
                        <div class="col-12">
                            <label class="form-label">Short bio</label>
                            <textarea class="form-control" rows="4" th:field="*{bio}"></textarea>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('bio')}" th:errors="*{bio}"></div>
                        </div>
                        <div class="col-12 d-flex justify-content-end gap-3">
                            <a class="btn btn-outline-secondary" th:href="@{/users}">Cancel</a>
                            <button class="btn btn-primary" type="submit">Create profile</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
