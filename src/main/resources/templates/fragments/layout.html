<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">MicroQuest</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" th:href="@{/quests}">Browse Quests</a></li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/quests/new}">Create Quest</a>
                </li>
                <li class="nav-item"><a class="nav-link" th:href="@{/users}">Users</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/leaderboard}">Leaderboard</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/about}">About</a></li>
                <!-- Admin link -->
                <li class="nav-item" sec:authorize="hasAuthority('ROLE_ADMIN')">
                    <a class="nav-link text-warning fw-semibold" th:href="@{/admin}">Admin</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <!-- Logged-in user -->
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                        <span sec:authentication="name">User</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li th:if="${currentUser != null}">
                            <a class="dropdown-item" th:href="@{|/users/${currentUser.id}|}">My Profile</a>
                        </li>
                        <li>
                            <a class="dropdown-item" th:href="@{/auth/change-password}">Change Password</a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li>
                            <form th:action="@{/auth/logout}" method="post" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                <button type="submit" class="dropdown-item text-danger">Sign Out</button>
                            </form>
                        </li>
                    </ul>
                </li>
                <!-- Guest -->
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" th:href="@{/auth/login}">Sign In</a>
                </li>
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link btn btn-primary text-white px-3 ms-1" th:href="@{/auth/register}">Register</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<footer th:fragment="footer" class="border-top mt-5 py-4 bg-white">
    <div class="container d-flex justify-content-between flex-column flex-md-row gap-2">
        <p class="mb-0 text-muted">Built with Spring Boot, Thymeleaf, PostgreSQL, Maven, Docker, and VS Code.</p>
        <p class="mb-0 text-muted">Development starter project.</p>
    </div>
</footer>
</body>
</html>
