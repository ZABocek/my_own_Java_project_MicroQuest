<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MicroQuest | Submit GIFs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-bg">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card border-0 shadow-sm rounded-4 p-4">
                <h1 class="h3 mb-1 fw-bold">Upload Your GIFs</h1>
                <p class="text-muted mb-4">Add one or more animated GIFs, each with its own caption.</p>

                <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
                <div th:if="${gifError}" class="alert alert-danger" th:text="${gifError}"></div>

                <div th:if="${alreadySubmitted}" class="alert alert-info mb-4">
                    You've already submitted GIFs for this quest — you can add more below!
                </div>

                <form th:action="@{|/quests/${questId}/submit|}"
                      method="post"
                      enctype="multipart/form-data">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <!-- GIF entry list -->
                    <div id="gif-entries">
                        <div class="gif-entry border rounded-4 p-3 mb-3 bg-light">
                            <p class="fw-semibold small text-muted mb-3">GIF <span class="entry-num">1</span></p>
                            <div class="mb-3">
                                <label class="form-label fw-semibold">GIF file <span class="text-danger">*</span></label>
                                <input type="file" class="form-control" name="gif" accept=".gif" required>
                                <div class="form-text">Animated GIF only. Max 10 MB per file.</div>
                            </div>
                            <div>
                                <label class="form-label fw-semibold">Caption</label>
                                <textarea class="form-control" name="caption" rows="2"
                                          placeholder="Tell the story behind this moment&#8230;" maxlength="500"></textarea>
                                <div class="form-text">Up to 500 characters.</div>
                            </div>
                        </div>
                    </div>

                    <button type="button" class="btn btn-outline-secondary w-100 mb-4" id="add-gif-btn">
                        + Add Another GIF
                    </button>

                    <div class="d-flex gap-3">
                        <button type="submit" class="btn btn-primary">Submit</button>
                        <a th:href="@{|/quests/${questId}|}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    var gifCount = 1;

    document.getElementById('add-gif-btn').addEventListener('click', function () {
        gifCount++;
        var entry = document.createElement('div');
        entry.className = 'gif-entry border rounded-4 p-3 mb-3 bg-light';
        entry.innerHTML =
            '<div class="d-flex justify-content-between align-items-center mb-3">' +
            '  <p class="fw-semibold small text-muted mb-0">GIF <span class="entry-num">' + gifCount + '</span></p>' +
            '  <button type="button" class="btn btn-sm btn-outline-danger">Remove</button>' +
            '</div>' +
            '<div class="mb-3">' +
            '  <label class="form-label fw-semibold">GIF file <span class="text-danger">*</span></label>' +
            '  <input type="file" class="form-control" name="gif" accept=".gif" required>' +
            '  <div class="form-text">Animated GIF only. Max 10 MB per file.</div>' +
            '</div>' +
            '<div>' +
            '  <label class="form-label fw-semibold">Caption</label>' +
            '  <textarea class="form-control" name="caption" rows="2"' +
            '            placeholder="Tell the story behind this moment\u2026" maxlength="500"></textarea>' +
            '  <div class="form-text">Up to 500 characters.</div>' +
            '</div>';
        entry.querySelector('button').addEventListener('click', function () {
            entry.remove();
            renumber();
        });
        document.getElementById('gif-entries').appendChild(entry);
    });

    function renumber() {
        var nums = document.querySelectorAll('.gif-entry .entry-num');
        for (var i = 0; i < nums.length; i++) {
            nums[i].textContent = i + 1;
        }
        gifCount = nums.length;
    }
</script>
</body>
</html>
