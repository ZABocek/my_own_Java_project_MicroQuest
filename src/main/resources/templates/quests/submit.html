<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MicroQuest | Submit GIF</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-bg">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card border-0 shadow-sm rounded-4 p-4">
                <h1 class="h3 mb-1 fw-bold">Complete This Quest</h1>
                <p class="text-muted mb-4">Upload your animated GIF and add a caption to complete the quest.</p>

                <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>
                <div th:if="${gifError}" class="alert alert-danger" th:text="${gifError}"></div>

                <div th:if="${alreadySubmitted}" class="alert alert-info">
                    You have already submitted a GIF for this quest. You can submit again to add another!
                </div>

                <form th:action="@{|/quests/${questId}/submit|}"
                      th:object="${submissionForm}"
                      method="post"
                      enctype="multipart/form-data"
                      novalidate>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">
                            Your GIF <span class="text-danger">*</span>
                        </label>
                        <input type="file" class="form-control" name="gif" accept=".gif" required>
                        <div class="form-text">GIF files only. Max 10 MB.</div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label fw-semibold">Caption</label>
                        <textarea class="form-control" th:field="*{caption}"
                                  th:classappend="${#fields.hasErrors('caption')} ? 'is-invalid'"
                                  rows="3"
                                  placeholder="Tell the story behind this moment…"></textarea>
                        <div class="invalid-feedback" th:errors="*{caption}">Caption error</div>
                        <div class="form-text">Up to 500 characters. Will appear below your GIF on your profile.</div>
                    </div>

                    <div class="d-flex gap-3">
                        <button type="submit" class="btn btn-primary">Submit GIF</button>
                        <a th:href="@{|/quests/${questId}|}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
