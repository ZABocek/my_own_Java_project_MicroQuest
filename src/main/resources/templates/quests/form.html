<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MicroQuest | Quest Form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-bg">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-xl-9">
            <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
                    <div>
                        <h1 class="mb-1" th:text="${formMode == 'edit'} ? 'Edit Quest' : 'Create Quest'">Create Quest</h1>
                        <p class="text-muted mb-0">Build a short adventure users can complete in one sitting.</p>
                    </div>
                    <a class="btn btn-outline-secondary" th:href="@{/quests}">Back to browse</a>
                </div>

                <form th:action="${formMode == 'edit'} ? @{|/quests/${questId}|} : @{/quests}"
                      th:object="${questForm}" method="post">
                    <div class="row g-4">
                        <div class="col-md-8">
                            <label class="form-label">Title</label>
                            <input class="form-control" th:field="*{title}" placeholder="Example: Build a rainy-day city quest">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Estimated minutes</label>
                            <input class="form-control" type="number" th:field="*{estimatedMinutes}">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('estimatedMinutes')}" th:errors="*{estimatedMinutes}"></div>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Summary</label>
                            <input class="form-control" th:field="*{summary}" placeholder="One sentence that makes the quest sound appealing">
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('summary')}" th:errors="*{summary}"></div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Category</label>
                            <select class="form-select" th:field="*{category}">
                                <option value="">Select</option>
                                <option th:each="categoryOption : ${categories}" th:value="${categoryOption}" th:text="${categoryOption}"></option>
                            </select>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Difficulty</label>
                            <select class="form-select" th:field="*{difficulty}">
                                <option value="">Select</option>
                                <option th:each="difficultyOption : ${difficulties}" th:value="${difficultyOption}" th:text="${difficultyOption}"></option>
                            </select>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('difficulty')}" th:errors="*{difficulty}"></div>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">Author profile</label>
                            <select class="form-select" th:field="*{authorId}">
                                <option value="">Select</option>
                                <option th:each="user : ${allUsers}" th:value="${user.id}" th:text="${user.displayName}"></option>
                            </select>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('authorId')}" th:errors="*{authorId}"></div>
                        </div>
                        <div class="col-12">
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" th:field="*{indoor}">
                                <label class="form-check-label">This quest can be done indoors</label>
                            </div>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Description</label>
                            <textarea class="form-control" rows="7" th:field="*{description}"></textarea>
                            <div class="text-danger small mt-1" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Tags</label>
                            <input class="form-control" th:field="*{tags}" placeholder="walking, budget, social, coffee">
                        </div>
                        <div class="col-12 d-flex justify-content-end gap-3">
                            <a class="btn btn-outline-secondary" th:href="@{/quests}">Cancel</a>
                            <button class="btn btn-primary" type="submit" th:text="${formMode == 'edit'} ? 'Save Changes' : 'Create Quest'">Create Quest</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
