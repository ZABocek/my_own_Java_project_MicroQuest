<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MicroQuest | Browse Quests</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-bg">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-5">
    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
        <div>
            <h1 class="mb-1">Browse Quests</h1>
            <p class="text-muted mb-0">Filter by category or difficulty and explore new ideas.</p>
        </div>
        <a class="btn btn-primary" sec:authorize="isAuthenticated()" th:href="@{/quests/new}">Create Quest</a>
    </div>

    <div class="card border-0 shadow-sm rounded-4 p-4 mb-4">
        <form class="row g-3" method="get" th:action="@{/quests}">
            <div class="col-md-5">
                <label class="form-label">Category</label>
                <select class="form-select" name="category">
                    <option value="">All categories</option>
                    <option th:each="categoryOption : ${categories}"
                            th:value="${categoryOption}"
                            th:text="${categoryOption}"
                            th:selected="${selectedCategory == categoryOption}"></option>
                </select>
            </div>
            <div class="col-md-5">
                <label class="form-label">Difficulty</label>
                <select class="form-select" name="difficulty">
                    <option value="">All difficulty levels</option>
                    <option th:each="difficultyOption : ${difficulties}"
                            th:value="${difficultyOption}"
                            th:text="${difficultyOption}"
                            th:selected="${selectedDifficulty == difficultyOption}"></option>
                </select>
            </div>
            <div class="col-md-2 d-grid align-items-end">
                <button class="btn btn-outline-dark mt-md-4" type="submit">Apply</button>
            </div>
        </form>
    </div>

    <div class="row g-4">
        <div class="col-md-6 col-xl-4" th:each="quest : ${questPage.content}">
            <div class="card h-100 border-0 shadow-sm rounded-4">
                <div class="card-body p-4">
                    <div class="d-flex gap-2 flex-wrap mb-3">
                        <span class="badge text-bg-primary" th:text="${quest.category}">CATEGORY</span>
                        <span class="badge text-bg-light" th:text="${quest.difficulty}">DIFFICULTY</span>
                        <span class="badge text-bg-secondary" th:text="${quest.indoor ? 'Indoor' : 'Outdoor'}">Indoor</span>
                    </div>
                    <h2 class="h5" th:text="${quest.title}">Quest title</h2>
                    <p class="text-muted" th:text="${quest.summary}">Summary</p>
                    <p class="small text-secondary mb-0">
                        By <span th:text="${quest.author.displayName}">Author</span>
                        • <span th:text="${quest.estimatedMinutes}">0</span> min
                    </p>
                </div>
                <div class="card-footer bg-white border-0 px-4 pb-4">
                    <a class="btn btn-outline-dark w-100" th:href="@{|/quests/${quest.id}|}">Open quest</a>
                </div>
            </div>
        </div>
    </div>

    <nav class="mt-4" th:if="${questPage.totalPages > 1}">
        <ul class="pagination">
            <li class="page-item" th:classappend="${questPage.first} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/quests(page=${questPage.number - 1}, category=${selectedCategory}, difficulty=${selectedDifficulty})}">Previous</a>
            </li>
            <li class="page-item disabled">
                <span class="page-link" th:text="|Page ${questPage.number + 1} of ${questPage.totalPages}|">Page 1 of 1</span>
            </li>
            <li class="page-item" th:classappend="${questPage.last} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/quests(page=${questPage.number + 1}, category=${selectedCategory}, difficulty=${selectedDifficulty})}">Next</a>
            </li>
        </ul>
    </nav>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
