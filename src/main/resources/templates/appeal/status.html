<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MicroQuest | My Appeals</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-bg">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-5">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <h1 class="h2 mb-4 fw-bold">My Appeals</h1>

    <div th:if="${#lists.isEmpty(appeals)}" class="alert alert-info">
        You have no appeals on record.
    </div>

    <div th:each="appeal : ${appeals}" class="card border-0 shadow-sm rounded-4 p-4 mb-3">
        <div class="d-flex gap-2 mb-2">
            <span class="badge"
                  th:text="${appeal.status}"
                  th:classappend="${appeal.status == pendingStatus} ? 'text-bg-warning' : (${appeal.status == acceptedStatus} ? 'text-bg-success' : 'text-bg-danger')">
            </span>
            <span class="badge text-bg-secondary" th:text="${appeal.banRecord.tier}"></span>
        </div>

        <p class="small text-muted mb-2">
            Submitted <span th:text="${#temporals.format(appeal.submittedAt, 'MMMM d, yyyy')}"></span>
        </p>

        <div class="row g-3">
            <div class="col-md-6">
                <div class="bg-light rounded-3 p-3">
                    <strong class="small d-block mb-1">Original ban reason:</strong>
                    <p class="mb-0 small" th:text="${appeal.banRecord.reason}"></p>
                </div>
            </div>
            <div class="col-md-6">
                <div class="border rounded-3 p-3">
                    <strong class="small d-block mb-1">Your message:</strong>
                    <p class="mb-0 small" th:text="${appeal.message}"></p>
                </div>
            </div>
        </div>

        <div th:if="${appeal.adminResponse != null}" class="mt-3 p-3 rounded-3"
             th:classappend="${appeal.status == acceptedStatus} ? 'bg-success bg-opacity-10' : 'bg-danger bg-opacity-10'">
            <strong class="small d-block mb-1">Admin response:</strong>
            <p class="mb-0 small" th:text="${appeal.adminResponse}"></p>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
