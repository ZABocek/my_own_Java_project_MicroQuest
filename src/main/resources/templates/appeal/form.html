<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MicroQuest | Submit Appeal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-bg">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card border-0 shadow-sm rounded-4 p-4">
                <h1 class="h3 mb-1 fw-bold">Submit a Ban Appeal</h1>
                <p class="text-muted mb-4">Explain why you believe the ban was a mistake. Be respectful and specific.</p>

                <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                <div th:if="${hasExistingAppeal}" class="alert alert-warning">
                    You have already submitted an appeal for this ban. 
                    <a th:href="@{/appeal/status}" class="fw-semibold">Check your appeal status.</a>
                </div>

                <form th:unless="${hasExistingAppeal}"
                      th:action="@{/appeal/submit}"
                      th:object="${appealForm}"
                      method="post" novalidate>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <input type="hidden" th:field="*{banRecordId}" th:value="${banRecordId}">

                    <div class="mb-4">
                        <label class="form-label fw-semibold">
                            Your appeal message <span class="text-danger">*</span>
                        </label>
                        <textarea class="form-control" th:field="*{message}"
                                  th:classappend="${#fields.hasErrors('message')} ? 'is-invalid'"
                                  rows="6"
                                  placeholder="Explain your situation clearly…"></textarea>
                        <div class="invalid-feedback" th:errors="*{message}">Message error</div>
                        <div class="form-text">Up to 2000 characters.</div>
                    </div>

                    <button type="submit" class="btn btn-primary">Submit Appeal</button>
                </form>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
