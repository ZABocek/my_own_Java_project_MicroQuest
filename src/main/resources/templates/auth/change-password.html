<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MicroQuest | Change Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-bg">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card border-0 shadow-sm rounded-4 p-4">
                <h1 class="h3 mb-4 fw-bold">Change Password</h1>

                <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

                <form th:action="@{/auth/change-password}" th:object="${passwordChangeForm}" method="post" novalidate>
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Current Password</label>
                        <input type="password" class="form-control" th:field="*{currentPassword}"
                               th:classappend="${#fields.hasErrors('currentPassword')} ? 'is-invalid'"
                               autocomplete="current-password">
                        <div class="invalid-feedback" th:errors="*{currentPassword}">Current password error</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">New Password</label>
                        <input type="password" class="form-control" th:field="*{newPassword}"
                               th:classappend="${#fields.hasErrors('newPassword')} ? 'is-invalid'"
                               autocomplete="new-password">
                        <div class="invalid-feedback" th:errors="*{newPassword}">New password error</div>
                        <div class="form-text">8+ characters with uppercase, lowercase, number, and symbol.</div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Confirm New Password</label>
                        <input type="password" class="form-control" th:field="*{confirmPassword}"
                               th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid'"
                               autocomplete="new-password">
                        <div class="invalid-feedback" th:errors="*{confirmPassword}">Confirm password error</div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">Update Password</button>
                </form>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
