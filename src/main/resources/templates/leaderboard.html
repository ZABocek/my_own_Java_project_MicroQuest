<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MicroQuest | Leaderboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-bg">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-5">
    <div class="row g-4">
        <div class="col-lg-7">
            <div class="card border-0 shadow-sm rounded-4 p-4 h-100">
                <h1 class="h3 mb-3">Top saved quests</h1>
                <div class="list-group list-group-flush">
                    <a class="list-group-item list-group-item-action px-0" th:each="row, iter : ${topSavedQuests}" th:href="@{|/quests/${row.questId}|}">
                        <div class="d-flex justify-content-between align-items-center gap-3">
                            <div>
                                <div class="fw-semibold">
                                    <span class="text-muted me-2" th:text="${iter.count}">1</span>
                                    <span th:text="${row.title}">Title</span>
                                </div>
                            </div>
                            <span class="badge text-bg-dark" th:text="${row.saveCount} + ' saves'">0 saves</span>
                        </div>
                    </a>
                </div>
            </div>
        </div>
        <div class="col-lg-5">
            <div class="card border-0 shadow-sm rounded-4 p-4 h-100">
                <h2 class="h4 mb-3">Top creators</h2>
                <div class="list-group list-group-flush">
                    <a class="list-group-item list-group-item-action px-0" th:each="row, iter : ${topCreators}" th:href="@{|/users/${row.userId}|}">
                        <div class="d-flex justify-content-between align-items-center gap-3">
                            <div>
                                <span class="text-muted me-2" th:text="${iter.count}">1</span>
                                <span class="fw-semibold" th:text="${row.displayName}">Name</span>
                            </div>
                            <span class="badge text-bg-primary" th:text="${row.questCount} + ' quests'">0 quests</span>
                        </div>
                    </a>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
