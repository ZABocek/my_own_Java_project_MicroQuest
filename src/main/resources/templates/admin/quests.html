<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MicroQuest | Admin – Pending Quests</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-bg">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-5">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="d-flex align-items-center gap-3 mb-4">
        <a th:href="@{/admin}" class="btn btn-outline-secondary btn-sm">&larr; Dashboard</a>
        <h1 class="h2 mb-0 fw-bold">Pending Quest Approvals</h1>
    </div>

    <div th:if="${#lists.isEmpty(pendingQuests)}" class="alert alert-success">
        No quests pending approval. All caught up!
    </div>

    <div th:each="quest : ${pendingQuests}" class="card border-0 shadow-sm rounded-4 p-4 mb-3">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
            <div>
                <div class="d-flex gap-2 mb-2">
                    <span class="badge text-bg-primary" th:text="${quest.category}"></span>
                    <span class="badge text-bg-light" th:text="${quest.difficulty}"></span>
                    <span class="badge text-bg-warning">Pending</span>
                </div>
                <h2 class="h4 mb-1" th:text="${quest.title}">Quest title</h2>
                <p class="text-muted mb-1" th:text="${quest.summary}">Summary</p>
                <small class="text-muted">
                    By <strong th:text="${quest.author.displayName}"></strong>
                    &middot; <span th:text="${quest.estimatedMinutes}"></span> min
                    &middot; <span th:text="${quest.indoor ? 'Indoor' : 'Outdoor'}"></span>
                </small>
                <div class="mt-2">
                    <p th:text="${quest.description}" class="mb-0 small"></p>
                </div>
            </div>
            <div class="d-flex flex-column gap-2 align-items-end">
                <form th:action="@{|/admin/quests/${quest.id}/approve|}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-success btn-sm">Approve</button>
                </form>
                <form th:action="@{|/admin/quests/${quest.id}/reject|}" method="post"
                      onsubmit="document.getElementById('reason-' + this.dataset.id).disabled = false;"
                      th:data-id="${quest.id}">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="input-group input-group-sm">
                        <input type="text" class="form-control" name="reason" placeholder="Rejection reason"
                               th:id="|reason-${quest.id}|">
                        <button type="submit" class="btn btn-outline-danger btn-sm">Reject</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
