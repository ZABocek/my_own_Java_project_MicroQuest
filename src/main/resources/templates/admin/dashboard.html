<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MicroQuest | Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-bg">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-5">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="d-flex align-items-center gap-3 mb-4">
        <h1 class="h2 mb-0 fw-bold">Admin Dashboard</h1>
        <span class="badge text-bg-danger">Admin</span>
    </div>

    <div class="row g-4 mb-5">
        <div class="col-md-4">
            <a th:href="@{/admin/quests}" class="text-decoration-none">
                <div class="card border-0 shadow-sm rounded-4 p-4 h-100 hover-card">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <p class="text-muted small mb-1">Pending Quest Approvals</p>
                            <h2 class="display-5 fw-bold mb-0" th:text="${pendingQuestCount}">0</h2>
                        </div>
                        <span class="badge text-bg-warning fs-6" th:if="${pendingQuestCount > 0}" th:text="${pendingQuestCount}">!</span>
                    </div>
                    <p class="text-primary mt-3 mb-0 small fw-semibold">Review Quests &rarr;</p>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a th:href="@{/admin/appeals}" class="text-decoration-none">
                <div class="card border-0 shadow-sm rounded-4 p-4 h-100 hover-card">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <p class="text-muted small mb-1">Pending Appeals</p>
                            <h2 class="display-5 fw-bold mb-0" th:text="${pendingAppealsCount}">0</h2>
                        </div>
                        <span class="badge text-bg-warning fs-6" th:if="${pendingAppealsCount > 0}" th:text="${pendingAppealsCount}">!</span>
                    </div>
                    <p class="text-primary mt-3 mb-0 small fw-semibold">Review Appeals &rarr;</p>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a th:href="@{/admin/reports}" class="text-decoration-none">
                <div class="card border-0 shadow-sm rounded-4 p-4 h-100 hover-card">
                    <div class="d-flex justify-content-between align-items-start">
                        <div>
                            <p class="text-muted small mb-1">Unreviewed Reports</p>
                            <h2 class="display-5 fw-bold mb-0" th:text="${unreviewedReportsCount}">0</h2>
                        </div>
                        <span class="badge text-bg-warning fs-6" th:if="${unreviewedReportsCount > 0}" th:text="${unreviewedReportsCount}">!</span>
                    </div>
                    <p class="text-primary mt-3 mb-0 small fw-semibold">Review Reports &rarr;</p>
                </div>
            </a>
        </div>
    </div>

    <div class="row g-3">
        <div class="col-auto">
            <a th:href="@{/admin/users}" class="btn btn-outline-dark">Manage Users</a>
        </div>
        <div class="col-auto">
            <a th:href="@{/admin/quests}" class="btn btn-outline-dark">Pending Quests</a>
        </div>
        <div class="col-auto">
            <a th:href="@{/admin/appeals}" class="btn btn-outline-dark">Appeals</a>
        </div>
        <div class="col-auto">
            <a th:href="@{/admin/reports}" class="btn btn-outline-dark">User Reports</a>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
