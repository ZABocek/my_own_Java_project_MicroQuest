<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MicroQuest | Admin – User Reports</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-bg">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-5">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="d-flex align-items-center gap-3 mb-4">
        <a th:href="@{/admin}" class="btn btn-outline-secondary btn-sm">&larr; Dashboard</a>
        <h1 class="h2 mb-0 fw-bold">User Reports</h1>
    </div>

    <div th:if="${#lists.isEmpty(reports)}" class="alert alert-success">
        No unreviewed reports. All caught up!
    </div>

    <div th:each="report : ${reports}" class="card border-0 shadow-sm rounded-4 p-4 mb-3">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-3">
            <div>
                <p class="mb-1 small text-muted">
                    Reported <span th:text="${#temporals.format(report.reportedAt, 'MMM d, yyyy')}"></span>
                    by <a th:href="@{|/users/${report.reportingUser.id}|}" th:text="${report.reportingUser.displayName}"></a>
                </p>
                <h2 class="h5 mb-1">
                    Report against:
                    <a th:href="@{|/users/${report.reportedUser.id}|}" th:text="${report.reportedUser.displayName}" class="fw-bold text-decoration-none"></a>
                </h2>
                <div class="bg-light rounded-3 p-3 mt-2">
                    <p class="mb-0 small" th:text="${report.reason}"></p>
                </div>
            </div>
            <div class="d-flex flex-column gap-2 align-items-end">
                <a th:href="@{|/users/${report.reportedUser.id}|}" class="btn btn-outline-secondary btn-sm">
                    View Profile
                </a>
                <form th:action="@{|/admin/reports/${report.id}/dismiss|}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <button type="submit" class="btn btn-outline-dark btn-sm">Mark Reviewed</button>
                </form>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
