<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MicroQuest | Admin – Manage Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-bg">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-5">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

    <div class="d-flex align-items-center gap-3 mb-4">
        <a th:href="@{/admin}" class="btn btn-outline-secondary btn-sm">&larr; Dashboard</a>
        <h1 class="h2 mb-0 fw-bold">Manage Users</h1>
    </div>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
        <div class="table-responsive">
            <table class="table table-hover mb-0 align-middle">
                <thead class="table-light">
                    <tr>
                        <th>User</th>
                        <th>Email</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Photo ID</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${allUsers}">
                        <td>
                            <a th:href="@{|/users/${user.id}|}" th:text="${user.displayName}" class="fw-semibold text-decoration-none"></a>
                            <div class="text-muted small" th:text="'@' + ${user.username}"></div>
                        </td>
                        <td class="small" th:text="${user.email != null ? user.email : '—'}"></td>
                        <td>
                            <span th:text="${user.role}" class="badge"
                                  th:classappend="${user.role.name() == 'ROLE_ADMIN'} ? 'text-bg-danger' : 'text-bg-secondary'">
                            </span>
                        </td>
                        <td>
                            <span th:if="${!user.active}" class="badge text-bg-dark">Permanently Banned</span>
                            <span th:if="${user.active and user.bannedUntil != null}" class="badge text-bg-warning">
                                Temp Banned
                            </span>
                            <span th:if="${user.active and user.bannedUntil == null}" class="badge text-bg-success">Active</span>
                            <div th:if="${!user.emailVerified}" class="text-warning small">Unverified email</div>
                        </td>
                        <td>
                            <a th:if="${user.photoIdPath != null}"
                               th:href="@{|/admin/photo-id/${user.photoIdPath}|}"
                               target="_blank" class="btn btn-outline-secondary btn-sm">View ID</a>
                            <span th:if="${user.photoIdPath == null}" class="text-muted small">None</span>
                        </td>
                        <td>
                            <div class="d-flex gap-1 flex-wrap">
                                <!-- Ban -->
                                <button th:if="${user.active and user.role.name() != 'ROLE_ADMIN'}"
                                        class="btn btn-outline-danger btn-sm"
                                        data-bs-toggle="collapse"
                                        th:data-bs-target="|#ban-form-${user.id}|">
                                    Ban
                                </button>
                                <!-- Unban -->
                                <form th:if="${!user.active or user.bannedUntil != null}"
                                      th:action="@{|/admin/users/${user.id}/unban|}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button type="submit" class="btn btn-outline-success btn-sm">Unban</button>
                                </form>
                                <form th:if="${user.role.name() != 'ROLE_ADMIN'}"
                                      th:action="@{|/admin/users/${user.id}/delete|}" method="post"
                                      th:data-username="${user.displayName}"
                                      onsubmit="return confirm('Permanently delete user &quot;' + this.dataset.username + '&quot;? All their data will be removed. This cannot be undone.')">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <button type="submit" class="btn btn-danger btn-sm">Delete User</button>
                                </form>
                            </div>
                            <!-- Ban form (collapsed) -->
                            <div th:id="|ban-form-${user.id}|" class="collapse mt-2">
                                <form th:action="@{|/admin/users/${user.id}/ban|}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <div class="input-group input-group-sm">
                                        <input type="text" class="form-control" name="reason" placeholder="Ban reason (required)">
                                        <button type="submit" class="btn btn-danger">Confirm Ban</button>
                                    </div>
                                    <div class="form-text text-danger small mt-1">
                                        Bans escalate: 1st = 1 month, 2nd = 3 months, 3rd+ = permanent.
                                    </div>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
