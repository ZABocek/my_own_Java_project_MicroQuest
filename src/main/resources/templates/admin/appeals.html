<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MicroQuest | Admin – Appeals</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="app-bg">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-5">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <div class="d-flex align-items-center gap-3 mb-4">
        <a th:href="@{/admin}" class="btn btn-outline-secondary btn-sm">&larr; Dashboard</a>
        <h1 class="h2 mb-0 fw-bold">Pending Appeals</h1>
    </div>

    <div th:if="${#lists.isEmpty(pendingAppeals)}" class="alert alert-success">
        No appeals pending. All caught up!
    </div>

    <div th:each="appeal : ${pendingAppeals}" class="card border-0 shadow-sm rounded-4 p-4 mb-3">
        <div class="row g-3">
            <div class="col-lg-8">
                <div class="d-flex gap-2 mb-2">
                    <span class="badge text-bg-warning">Pending Review</span>
                    <span class="badge"
                          th:text="${appeal.banRecord.tier}"
                          th:classappend="${appeal.banRecord.tier.name() == 'PERMANENT'} ? 'text-bg-dark' : 'text-bg-secondary'">
                    </span>
                </div>
                <h2 class="h5 mb-1">
                    Appeal from <strong th:text="${appeal.user.displayName}"></strong>
                </h2>
                <p class="text-muted small mb-2">
                    Submitted <span th:text="${#temporals.format(appeal.submittedAt, 'MMM d, yyyy')}"></span>
                </p>
                <div class="bg-light rounded-3 p-3 mb-2">
                    <strong class="small d-block mb-1">Original ban reason:</strong>
                    <p class="mb-0 small" th:text="${appeal.banRecord.reason}"></p>
                </div>
                <div class="bg-white border rounded-3 p-3">
                    <strong class="small d-block mb-1">User's appeal message:</strong>
                    <p class="mb-0" th:text="${appeal.message}"></p>
                </div>
            </div>
            <div class="col-lg-4">
                <form th:action="@{|/admin/appeals/${appeal.id}/accept|}" method="post" class="mb-2">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="mb-2">
                        <input type="text" class="form-control form-control-sm" name="adminResponse"
                               placeholder="Response to user (optional)"
                               value="Appeal accepted. Your account has been restored.">
                    </div>
                    <button type="submit" class="btn btn-success btn-sm w-100">Accept Appeal &amp; Lift Ban</button>
                </form>
                <form th:action="@{|/admin/appeals/${appeal.id}/reject|}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                    <div class="mb-2">
                        <input type="text" class="form-control form-control-sm" name="adminResponse"
                               placeholder="Reason for rejection"
                               value="Appeal reviewed and denied.">
                    </div>
                    <button type="submit" class="btn btn-outline-danger btn-sm w-100">Reject Appeal</button>
                </form>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
